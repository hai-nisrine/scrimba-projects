<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCOREBOARD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class ="scoreboard">
        
    <div class="team">
        <h1>HOME</h1>
        <span id="home-score">0</span>
        <div class="buttons">
        <button id="home-freethrow" onclick="addHomeScoreBy1()">+1</button>
        <button id="home-fieldgoal" onclick="addHomeScoreBy2()">+2</button>
        <button id="home-threepointer" onclick="addHomeScoreBy3()">+3</button>
        </div>
        </div>

    <div class="team">
        <h1>GUEST</h1>
        <span id="guest-score">0</span>
         <div class="buttons">
        <button id="guest-freethrow" onclick="addGuestScoreBy1()">+1</button>
        <button id="guest-fieldgoal" onclick="addGuestScoreBy2()">+2</button>
        <button id="guest-threepointer" onclick="addGuestScoreBy3()">+3</button>
        </div>
    </div>


    </div>

    <script src="script.js"></script>
</body>
</html>
