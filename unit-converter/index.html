<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <h1>Metric/Imperial Unit Conversion</h1>
    <input type="text" id="input-el">
    
    <div class="result-box">
    <h2>Length (Metric/Feet)</h2>
    <p>Meters to feet: <span id="feet-results"></span></p>
    <p>Feet to meters: <span id="meters-results"></span></p>
    <h2>Volume (Liters/Gallons)</h2>
    <p>Liters to gallons: <span id="gallons-results"></span></p>
    <p>Gallons to liters: <span id="liters-results"></span></p>
    <h2>Mass (Kilograms/Pounds)</h2>
    <p>Kilos to pounds:  <span id="pounds-results"></span></p>
    <p>Pounds to kilos: <span id="kilos-results"></span></p>
    </div>


    <script src="index.js"></script>
</body>
</html>
